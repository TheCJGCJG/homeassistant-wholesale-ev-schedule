<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Smooth Dark Theme Background Layer -->
  <rect width="512" height="512" rx="128" fill="#1A1F2C"/>
  
  <!-- Background Grid Nodes (Wind & Pylon) - Faded to keep icon clean at small sizes -->
  <g stroke="#E2E8F0" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.18">
    <!-- Wind Turbine (Left) -->
    <path d="M150 360 L170 200 L190 360" />
    <circle cx="170" cy="200" r="5" fill="#E2E8F0"/>
    <path d="M170 200 L135 170 M170 200 L205 170 M170 200 L170 245" />
    
    <!-- Electrical Pylon/Grid (Right) -->
    <path d="M320 360 L350 180 L380 360 M320 240 L380 240 M310 290 L390 290 M335 180 L365 180" />
    <path d="M320 360 L350 290 L350 180 M380 360 L350 290" />
  </g>

  <!-- The Wholesale/Tariff Clock Ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#0EA5E9" stroke-width="14"/>
  <!-- Clock Ticks (Representing the 30-min / hourly price slots) -->
  <path d="M256 92 L256 106 M256 420 L256 406 M92 256 L106 256 M420 256 L406 256" stroke="#0EA5E9" stroke-width="10" stroke-linecap="round"/>

  <!-- The EV (Car) Silhouette -->
  <g fill="#38BDF8" transform="translate(115, 230)">
    <!-- Car Body Shape -->
    <path d="M20 70 C5 70 0 60 0 50 C0 42 25 35 45 28 C65 20 100 0 140 0 C190 0 215 25 245 28 C265 30 280 40 280 55 C280 65 275 70 260 70 Z" />
    <!-- Wheel Cutouts & Wheels -->
    <circle cx="65" cy="70" r="28" fill="#1A1F2C"/>
    <circle cx="65" cy="70" r="20" fill="#38BDF8"/>
    <circle cx="215" cy="70" r="28" fill="#1A1F2C"/>
    <circle cx="215" cy="70" r="20" fill="#38BDF8"/>
    <!-- Charging Port glow indicator -->
    <circle cx="250" cy="40" r="6" fill="#4ADE80" />
  </g>

  <!-- Type-2 Charging Plug & Cable Intersecting as the Clock Hand -->
  <g transform="translate(256, 256)">
    <!-- Cable looping underneath, feeding the car -->
    <path d="M 0 0 C -40 80, -80 65, -110 30" fill="none" stroke="#4ADE80" stroke-width="16" stroke-linecap="round" opacity="0.85"/>
    
    <!-- Plug Body angled up/right like a Clock Hand pointing to a cheap price slot -->
    <g transform="rotate(45)">
      <!-- Main Plug Handle -->
      <path d="M-18 0 L-12 -110 C-12 -125 12 -125 12 -110 L18 0 Z" fill="#4ADE80"/>
      
      <!-- Type 2 Circular Head Layout -->
      <circle cx="0" cy="-85" r="22" fill="#1A1F2C" />
      <!-- Stylized 7-Pin cluster -->
      <circle cx="0" cy="-95" r="4" fill="#38BDF8"/>
      <circle cx="-10" cy="-88" r="4" fill="#E2E8F0"/>
      <circle cx="10" cy="-88" r="4" fill="#E2E8F0"/>
      <circle cx="-11" cy="-76" r="3" fill="#E2E8F0"/>
      <circle cx="11" cy="-76" r="3" fill="#E2E8F0"/>
      <circle cx="-5" cy="-67" r="3" fill="#E2E8F0"/>
      <circle cx="5" cy="-67" r="3" fill="#E2E8F0"/>
    </g>
  </g>
  
  <!-- Central Clock Pivot Pin -->
  <circle cx="256" cy="256" r="14" fill="#E2E8F0" stroke="#1A1F2C" stroke-width="4"/>
</svg>
