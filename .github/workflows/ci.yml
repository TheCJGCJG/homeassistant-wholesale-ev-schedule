name: Test and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: wholesale-ev-schedule-test:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run test suite
        run: >
          docker run --rm wholesale-ev-schedule-test
          pytest --cov=custom_components/wholesale_ev_schedule --cov-branch --cov-report=term-missing

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: wholesale-ev-schedule-test:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ruff check
        run: docker run --rm wholesale-ev-schedule-test ruff check custom_components tests

      - name: Ruff format --check
        run: docker run --rm wholesale-ev-schedule-test ruff format --check custom_components tests

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: wholesale-ev-schedule-test:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bandit (SAST)
        run: docker run --rm wholesale-ev-schedule-test bandit -r custom_components -c pyproject.toml

      - name: pip-audit (dependency CVEs)
        # Informational only: transitive-dependency CVEs are Dependabot's job
        # (see .github/dependabot.yml), not something to hand-pin here.
        continue-on-error: true
        run: docker run --rm wholesale-ev-schedule-test pip-audit

  release:
    needs: [test, lint, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest.json
        id: version
        run: |
          version=$(jq -r .version custom_components/wholesale_ev_schedule/manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether this version has already been released
        id: check_tag
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release zip
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          cd custom_components
          zip -r "$GITHUB_WORKSPACE/wholesale_ev_schedule.zip" wholesale_ev_schedule

      - name: Create GitHub release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: wholesale_ev_schedule.zip
