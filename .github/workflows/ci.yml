name: Test and Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t wholesale-ev-schedule-test .

      - name: Run test suite
        run: >
          docker run --rm wholesale-ev-schedule-test
          pytest --cov=custom_components/wholesale_ev_schedule --cov-branch --cov-report=term-missing

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest.json
        id: version
        run: |
          version=$(jq -r .version custom_components/wholesale_ev_schedule/manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether this version has already been released
        id: check_tag
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release zip
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          cd custom_components
          zip -r "$GITHUB_WORKSPACE/wholesale_ev_schedule.zip" wholesale_ev_schedule

      - name: Create GitHub release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: wholesale_ev_schedule.zip
